
name: QA SaaS Runner
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install -g @playwright/test
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      # Send webhook back to your SaaS when done
      # Send webhook back to your SaaS when done
      - run: curl -X POST -H "Content-Type: application/json" -d '{"repo":"tasmeerhaider/portfolio", "status":"passed", "executionTime":"45s"}' https://localhost:3000/api/webhook
    